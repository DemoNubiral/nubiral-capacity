<html lang="es">
<head>

<title>Nubiral — Capacity Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --black: #000000;
    --dark: #0d0d0d;
    --card: #141414;
    --card2: #1c1c1c;
    --gray-dark: #383838;
    --lime: #DFFF51;
    --lime-dim: rgba(223,255,81,0.1);
    --border: rgba(255,255,255,0.07);
    --border2: rgba(255,255,255,0.13);
    --text: #ffffff;
    --muted: #C9C9C9;
    --hint: #666;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Montserrat', -apple-system, sans-serif; background: var(--black); color: var(--text); font-size: 13px; }
  .header {
    background: #000; border-bottom: 0.5px solid var(--border2);
    padding: 0 28px; display: flex; align-items: center; justify-content: space-between;
    height: 58px; position: sticky; top: 0; z-index: 100;
  }
  .logo-wrap { display: flex; align-items: center; gap: 14px; }
  .logo-text { font-size: 17px; font-weight: 800; letter-spacing: -0.5px; }
  .hdiv { width: 1px; height: 20px; background: var(--border2); }
  .hsub { font-size: 11px; color: var(--hint); letter-spacing:.04em; }
  .hright { display: flex; align-items: center; gap: 12px; }
  .hdate { font-size: 11px; color: var(--hint); }
  .hpill { font-size: 10px; font-weight: 700; background: var(--lime-dim); color: var(--lime); padding: 4px 10px; border-radius: 20px; border: 0.5px solid rgba(223,255,81,0.25); }
  .container { max-width: 1440px; margin: 0 auto; padding: 24px 28px 48px; }
  .kpi-grid { display: grid; grid-template-columns: repeat(6,1fr); gap: 10px; margin-bottom: 22px; }
  .kpi { background: var(--card); border: 0.5px solid var(--border); border-radius: 10px; padding: 16px 18px; position: relative; overflow: hidden; }
  .kpi:hover { border-color: rgba(223,255,81,0.18); }
  .kpi.hi { border-color: rgba(223,255,81,0.25); background: rgba(223,255,81,0.04); }
  .kpi-label { font-size: 9px; font-weight: 700; color: var(--hint); text-transform: uppercase; letter-spacing:.08em; margin-bottom: 8px; }
  .kpi-value { font-size: 26px; font-weight: 800; letter-spacing:-1px; line-height: 1; }
  .kpi.hi .kpi-value { color: var(--lime); }
  .kpi-sub { font-size: 10px; color: var(--hint); margin-top: 5px; }
  .kpi-bar { position: absolute; bottom: 0; left: 0; right: 0; height: 2px; background: var(--gray-dark); }
  .kpi.hi .kpi-bar { background: var(--lime); opacity: .4; }
  .charts-row { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 12px; margin-bottom: 22px; }
  .chart-card { background: var(--card); border: 0.5px solid var(--border); border-radius: 10px; padding: 18px 20px; }
  .chart-title { font-size: 9px; font-weight: 700; color: var(--hint); text-transform: uppercase; letter-spacing:.08em; margin-bottom: 14px; display: flex; align-items: center; gap: 6px; }
  .chart-title::before { content:''; display:inline-block; width:6px; height:6px; border-radius:50%; background:var(--lime); }
  .bar-row { display:flex; align-items:center; gap:8px; margin-bottom:8px; }
  .bar-label { font-size:11px; color:var(--muted); width:110px; flex-shrink:0; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
  .bar-track { flex:1; height:4px; background:var(--gray-dark); border-radius:2px; overflow:hidden; }
  .bar-fill { height:100%; border-radius:2px; background:var(--lime); }
  .bar-count { font-size:10px; color:var(--hint); width:26px; text-align:right; flex-shrink:0; font-weight:700; }
  .slabel { font-size:9px; font-weight:700; color:var(--hint); text-transform:uppercase; letter-spacing:.1em; margin-bottom:10px; display:flex; align-items:center; gap:8px; }
  .slabel::after { content:''; flex:1; height:.5px; background:var(--border); }
  .toolbar { background:var(--card); border:0.5px solid var(--border); border-radius:10px; padding:12px 16px; margin-bottom:10px; display:flex; flex-wrap:wrap; gap:8px; align-items:center; }
  .swrap { flex:1; min-width:200px; position:relative; }
  .sicon { position:absolute; left:11px; top:50%; transform:translateY(-50%); color:var(--hint); pointer-events:none; }
  input[type=text] { width:100%; padding:8px 10px 8px 33px; border:0.5px solid var(--border2); border-radius:7px; font-size:12px; font-family:'Montserrat',sans-serif; color:var(--text); background:var(--dark); outline:none; }
  input[type=text]:focus { border-color:var(--lime); }
  input[type=text]::placeholder { color:var(--hint); }
  select { padding:8px 10px; border:0.5px solid var(--border2); border-radius:7px; font-size:11px; font-family:'Montserrat',sans-serif; font-weight:600; color:var(--muted); background:var(--dark); outline:none; cursor:pointer; }
  select:focus { border-color:var(--lime); }
  option { background:#1a1a1a; }
  .rbtn { padding:8px 14px; border:0.5px solid var(--border2); border-radius:7px; font-size:11px; font-family:'Montserrat',sans-serif; font-weight:700; color:var(--hint); background:var(--dark); cursor:pointer; letter-spacing:.04em; }
  .rbtn:hover { border-color:var(--lime); color:var(--lime); }
  .ctag { font-size:11px; color:var(--hint); margin-left:auto; white-space:nowrap; font-weight:600; }
  .cnum { color:var(--lime); }
  .twrap { background:var(--card); border:0.5px solid var(--border); border-radius:10px; overflow:hidden; }
  .tscroll { overflow-x:auto; overflow-y:auto; max-height:calc(100vh - 340px); }
  table { width:100%; border-collapse:collapse; min-width:900px; }
  thead { position:sticky; top:0; z-index:10; }
  th { background:var(--card2); font-size:9px; font-weight:700; text-transform:uppercase; letter-spacing:.08em; color:var(--hint); text-align:left; padding:10px 14px; border-bottom:0.5px solid var(--border2); cursor:pointer; user-select:none; white-space:nowrap; }
  th:hover { color:var(--muted); }
  th.sorted { color:var(--lime); }
  .arr { opacity:.5; font-size:9px; }
  th.sorted .arr { opacity:1; }
  td { padding:10px 14px; border-bottom:0.5px solid var(--border); color:var(--muted); font-size:11px; font-weight:500; max-width:200px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
  tr:last-child td { border-bottom:none; }
  tr:hover td { background:rgba(255,255,255,0.025); color:var(--text); }
  .tcrm { color:var(--lime); font-weight:700; font-size:12px; }
  .tnum { text-align:right; font-variant-numeric:tabular-nums; font-weight:700; color:var(--text); }
  .badge { display:inline-flex; align-items:center; font-size:9px; font-weight:700; padding:2px 8px; border-radius:20px; letter-spacing:.04em; text-transform:uppercase; white-space:nowrap; }
  .bg { background:rgba(34,197,94,.1); color:#4ade80; border:.5px solid rgba(34,197,94,.2); }
  .ba { background:rgba(234,179,8,.1); color:#facc15; border:.5px solid rgba(234,179,8,.2); }
  .br { background:rgba(239,68,68,.1); color:#f87171; border:.5px solid rgba(239,68,68,.2); }
  .bb { background:rgba(99,102,241,.1); color:#818cf8; border:.5px solid rgba(99,102,241,.2); }
  .bl { background:rgba(223,255,81,.08); color:#DFFF51; border:.5px solid rgba(223,255,81,.2); }
  .bx { background:rgba(255,255,255,.04); color:#6b7280; border:.5px solid rgba(255,255,255,.07); }
  .pgn { display:flex; align-items:center; gap:8px; padding:12px 16px; border-top:.5px solid var(--border); }
  .pbtn { padding:6px 12px; border:.5px solid var(--border2); border-radius:6px; font-size:11px; font-family:'Montserrat',sans-serif; font-weight:700; color:var(--muted); background:var(--dark); cursor:pointer; }
  .pbtn:hover:not(:disabled) { border-color:var(--lime); color:var(--lime); }
  .pbtn:disabled { opacity:.3; cursor:default; }
  .pinfo { font-size:11px; color:var(--hint); font-weight:600; }
  .psize { margin-left:auto; display:flex; align-items:center; gap:8px; font-size:11px; color:var(--hint); font-weight:600; }
  canvas{max-width:100%}
  .qfw{background:var(--card);border:.5px solid rgba(223,255,81,0.3);border-radius:12px;padding:18px 22px;margin-bottom:22px;display:flex;flex-wrap:wrap;gap:16px;align-items:flex-end}
  .qfw-title{font-size:9px;font-weight:700;color:var(--lime);text-transform:uppercase;letter-spacing:.1em;display:flex;align-items:center;gap:6px;align-self:flex-start;padding-top:4px;white-space:nowrap}
  .qfw-title::before{content:'';display:inline-block;width:6px;height:6px;border-radius:50%;background:var(--lime)}
  .qfg{display:flex;flex-direction:column;gap:5px}
  .qfg label{font-size:10px;font-weight:700;color:var(--lime);text-transform:uppercase;letter-spacing:.06em}
  .qfg select{padding:9px 14px;border:.5px solid rgba(223,255,81,0.35);border-radius:8px;font-size:12px;font-family:'Montserrat',sans-serif;font-weight:700;color:#fff;background:#0d0d0d;outline:none;cursor:pointer;min-width:140px}
  .qfg select:focus{border-color:var(--lime);box-shadow:0 0 0 3px rgba(223,255,81,0.08)}
  .modal-section{margin-bottom:20px}
  .modal-section-title{font-size:9px;font-weight:700;color:var(--hint);text-transform:uppercase;letter-spacing:.1em;margin-bottom:10px;padding-bottom:6px;border-bottom:.5px solid var(--border);display:flex;align-items:center;gap:6px}
  .modal-section-title::before{content:'';display:inline-block;width:5px;height:5px;border-radius:50%;background:var(--lime)}
  .modal-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:8px}
  .modal-field{background:rgba(255,255,255,0.03);border:.5px solid var(--border);border-radius:7px;padding:8px 12px}
  .modal-field-label{font-size:9px;font-weight:700;color:var(--hint);text-transform:uppercase;letter-spacing:.06em;margin-bottom:3px}
  .modal-field-value{font-size:12px;color:#ddd;font-weight:500;line-height:1.4;word-break:break-word}
  .modal-field.wide{grid-column:1/-1}
  .modal-field-value.lime{color:var(--lime);font-weight:700}
  #modal::-webkit-scrollbar{width:6px}
  #modal::-webkit-scrollbar-track{background:transparent}
  #modal::-webkit-scrollbar-thumb{background:rgba(255,255,255,0.1);border-radius:3px}
  @media(max-width:1100px){.kpi-grid{grid-template-columns:repeat(3,1fr)}.charts-row{grid-template-columns:1fr}}
  @media(max-width:700px){.kpi-grid{grid-template-columns:1fr 1fr}.hsub{display:none}}
</style>
</head>

const DATA=RAW.filter(r=>r[1]&&r[1]!=='#N/A'&&r[0]&&r[1].trim()!=='');
let filt=[...DATA],sc=-1,sa=true,pg=0,PS=50;

function pn(v){if(!v)return 0;return parseFloat(String(v).replace(/[$.\s,]/g,''))||0;}
function mf(v){const n=pn(v);if(n>=1e6)return'$'+(n/1e6).toFixed(1)+'M';if(n>=1e3)return'$'+(n/1e3).toFixed(0)+'K';return n?'$'+n.toLocaleString('es-AR'):'—';}

function bdg(val){
  if(!val||val==='#N/A')return'<span style="color:var(--hint)">—</span>';
  const v=val.toLowerCase();
  if(v==='closed')return`<span class="badge bg">${val}</span>`;
  if(['cancelled','cancelado','no llego','no paso'].some(x=>v.includes(x)))return`<span class="badge br">${val}</span>`;
  if(['progress','avanza','revisada','priorizado'].some(x=>v.includes(x)))return`<span class="badge bb">${val}</span>`;
  if(['returned','bloqueado','on hold','backlog','validación'].some(x=>v.includes(x)))return`<span class="badge ba">${val}</span>`;
  if(['relevamiento','kick off','pre-kick','ejecucion','ept'].some(x=>v.includes(x)))return`<span class="badge bl">${val}</span>`;
  return`<span class="badge bx">${val}</span>`;
}
function pbdg(v){
  if(!v||v==='#N/A')return'<span style="color:var(--hint)">—</span>';
  const n=parseInt(v);
  if(n>=75)return`<span class="badge bg">${v}%</span>`;
  if(n>=40)return`<span class="badge ba">${v}%</span>`;
  return`<span class="badge bx">${v}%</span>`;
}

function pop(id,idx){
  const s=document.getElementById(id);
  const vals=[...new Set(DATA.map(r=>r[idx]).filter(v=>v&&v!=='#N/A'))].sort();
  vals.forEach(v=>{const o=document.createElement('option');o.value=v;o.textContent=v;s.appendChild(o);});
}
function popSorted(id,idx,sortKey){
  const s=document.getElementById(id);
  const vals=[...new Set(DATA.map(r=>r[idx]).filter(v=>v&&v!=='#N/A'&&v!=='1899'))];
  vals.sort((a,b)=>sortKey(a)-sortKey(b));
  const labels={1:'Ene',2:'Feb',3:'Mar',4:'Abr',5:'May',6:'Jun',7:'Jul',8:'Ago',9:'Sep',10:'Oct',11:'Nov',12:'Dic'};
  vals.forEach(v=>{const o=document.createElement('option');o.value=v;o.textContent=labels[parseInt(v)]||v;s.appendChild(o);});
}

// Columns that are purely numeric (no currency formatting)
const NUM_COLS=new Set([F.CRM,F.Pb,F.Ms,F.An]);
// Columns with money formatting ($1.234.567)
const MONEY_COLS=new Set([F.Pr,F.Ve]);

function parseCol(v,col){
  const s=String(v||'').trim();
  if(!s||s==='#N/A') return NaN;
  if(NUM_COLS.has(col)) return parseFloat(s)||NaN;
  if(MONEY_COLS.has(col)){
    // Remove $ and thousands dots, keep last dot only if decimal separator
    const clean=s.replace(/\$/g,'').replace(/\./g,'').replace(',','.');
    return parseFloat(clean)||NaN;
  }
  return NaN;
}

function srt(){
  filt.sort((a,b)=>{
    const av=a[sc]??'', bv=b[sc]??'';
    const an=parseCol(av,sc), bn=parseCol(bv,sc);
    let r;
    if(!isNaN(an)&&!isNaN(bn)) r=an-bn;
    else r=String(av).localeCompare(String(bv),'es',{sensitivity:'base'});
    return sa?r:-r;
  });
}

function kpis(){

  const hi=filt.filter(r=>parseInt(r[F.Pb])>=75).length;
  const paises=[...new Set(filt.map(r=>r[F.Pa]).filter(Boolean))].length;
  const clts=[...new Set(filt.map(r=>r[F.Cl]).filter(Boolean))].length;
  document.getElementById('kgrid').innerHTML=[

function bc(obj,title){
  const sorted=Object.entries(obj).sort((a,b)=>b[1]-a[1]).slice(0,7);
  const mx=sorted[0]?.[1]||1;
  return`<div class="chart-card">
    <div class="chart-title">${title}</div>
    ${sorted.map(([k,v])=>`<div class="bar-row">
      <div class="bar-label" title="${k}">${k}</div>
      <div class="bar-track"><div class="bar-fill" style="width:${Math.round(v/mx*100)}%"></div></div>
      <div class="bar-count">${v}</div>
    </div>`).join('')}
  </div>`;
}

function renderPipeline(){
  const group=document.getElementById('pipeline-group').value;
  const metric=document.getElementById('pipeline-metric').value;
  const canvas=document.getElementById('pipeline-chart');
  const ctx=canvas.getContext('2d');

  // Build buckets
  const buckets={};
  filt.forEach(r=>{
    const ano=r[F.An], mes=r[F.Ms];
    if(!ano||ano==='1899'||!mes) return;
    const key = group==='mes' ? `${ano}-${String(mes).padStart(2,'0')}` : ano;
    if(!buckets[key]) buckets[key]={count:0,venta:0};
    buckets[key].count++;
    buckets[key].venta+=pn(r[F.Ve]);
  });

  const keys=Object.keys(buckets).sort();
  if(!keys.length){ctx.clearRect(0,0,canvas.width,canvas.height);return;}

  const vals=keys.map(k=>metric==='count'?buckets[k].count:buckets[k].venta);
  const maxVal=Math.max(...vals)||1;

  // Resize canvas
  const dpr=window.devicePixelRatio||1;
  const W=canvas.parentElement.clientWidth-48;
  const H=200;
  canvas.width=W*dpr; canvas.height=H*dpr;
  canvas.style.width=W+'px'; canvas.style.height=H+'px';
  ctx.scale(dpr,dpr);
  ctx.clearRect(0,0,W,H);

  const PAD_L=metric==='venta'?58:36, PAD_R=12, PAD_T=16, PAD_B=40;
  const chartW=W-PAD_L-PAD_R;
  const chartH=H-PAD_T-PAD_B;
  const barW=Math.max(4, Math.min(40, (chartW/keys.length)*0.7));
  const gap=(chartW-barW*keys.length)/(keys.length+1);

  // Grid lines
  ctx.strokeStyle='rgba(255,255,255,0.05)';
  ctx.lineWidth=1;
  for(let i=0;i<=4;i++){
    const y=PAD_T+chartH*(1-i/4);
    ctx.beginPath();ctx.moveTo(PAD_L,y);ctx.lineTo(PAD_L+chartW,y);ctx.stroke();
    // Y label
    const lv=maxVal*(i/4);
    let label=metric==='venta'?(lv>=1e6?'$'+(lv/1e6).toFixed(1)+'M':lv>=1e3?'$'+(lv/1e3).toFixed(0)+'K':'$'+lv.toFixed(0)):lv.toFixed(0);
    ctx.fillStyle='rgba(255,255,255,0.3)';ctx.font='9px Montserrat,sans-serif';ctx.textAlign='right';
    ctx.fillText(label,PAD_L-4,y+3);
  }

  // Bars
  const lime='#DFFF51';
  keys.forEach((k,i)=>{
    const x=PAD_L+gap*(i+1)+barW*i;
    const barH=Math.max(2,(vals[i]/maxVal)*chartH);
    const y=PAD_T+chartH-barH;

    // Bar with gradient
    const grad=ctx.createLinearGradient(0,y,0,y+barH);
    grad.addColorStop(0,lime);
    grad.addColorStop(1,'rgba(223,255,81,0.3)');
    ctx.fillStyle=grad;
    ctx.beginPath();
    ctx.roundRect(x,y,barW,barH,2);
    ctx.fill();

    // X label
    const mes_names=['','Ene','Feb','Mar','Abr','May','Jun','Jul','Ago','Sep','Oct','Nov','Dic'];
    let lbl=k;
    if(group==='mes'){const[ay,am]=k.split('-');lbl=mes_names[parseInt(am)]||am;}
    ctx.fillStyle='rgba(255,255,255,0.4)';
    ctx.font='9px Montserrat,sans-serif';ctx.textAlign='center';
    ctx.fillText(lbl,x+barW/2,H-PAD_B+14);
    if(group==='mes'){ctx.fillStyle='rgba(255,255,255,0.2)';ctx.fillText(k.split('-')[0],x+barW/2,H-PAD_B+24);}

    // Value on hover — show on top of bar
    if(barH>20){
      let topLabel=metric==='venta'?(vals[i]>=1e6?(vals[i]/1e6).toFixed(1)+'M':vals[i]>=1e3?(vals[i]/1e3).toFixed(0)+'K':vals[i]):vals[i];
      ctx.fillStyle='rgba(255,255,255,0.5)';ctx.font='8px Montserrat,sans-serif';ctx.textAlign='center';
      ctx.fillText(topLabel,x+barW/2,y-3);
    }
  });
}

function initQF(){
  const mN={1:'Ene',2:'Feb',3:'Mar',4:'Abr',5:'May',6:'Jun',7:'Jul',8:'Ago',9:'Sep',10:'Oct',11:'Nov',12:'Dic'};
  // Ref
  const qr=document.getElementById('qf-ref');
  [...new Set(DATA.map(r=>r[F.Re]).filter(v=>v&&v!=='#N/A'))].sort()
    .forEach(v=>{const o=document.createElement('option');o.value=v;o.textContent=v;qr.appendChild(o);});
  if([...qr.options].some(o=>o.value==='Pipeline')) qr.value='Pipeline';
  // Año
  const qa=document.getElementById('qf-ano');
  [...new Set(DATA.map(r=>r[F.An]).filter(v=>v&&v!=='#N/A'&&v!=='1899'))]
    .sort((a,b)=>parseInt(a)-parseInt(b))
    .forEach(v=>{const o=document.createElement('option');o.value=v;o.textContent=v;qa.appendChild(o);});
  // Mes
  const qm=document.getElementById('qf-mes');
  [...new Set(DATA.map(r=>r[F.Ms]).filter(v=>v&&v!=='#N/A'))]
    .sort((a,b)=>parseInt(a)-parseInt(b))
    .forEach(v=>{const o=document.createElement('option');o.value=v;o.textContent=mN[parseInt(v)]||v;qm.appendChild(o);});
  // Prob

  [...new Set(DATA.map(r=>r[F.Pb]).filter(v=>v&&v!=='#N/A'))]
    .sort((a,b)=>parseInt(a)-parseInt(b))
    .forEach(v=>{const o=document.createElement('option');o.value=v;o.textContent=v+'%';qp.appendChild(o);});
  qfChange();
}
