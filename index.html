<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nubiral — Capacity Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
  :root{--black:#000;--dark:#0d0d0d;--card:#141414;--card2:#1c1c1c;--gray-dark:#383838;--lime:#DFFF51;--lime-dim:rgba(223,255,81,0.1);--border:rgba(255,255,255,0.07);--border2:rgba(255,255,255,0.13);--text:#fff;--muted:#C9C9C9;--hint:#666}
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:'Montserrat',-apple-system,sans-serif;background:var(--black);color:var(--text);font-size:13px}
  .header{background:#000;border-bottom:.5px solid var(--border2);padding:0 28px;display:flex;align-items:center;justify-content:space-between;height:58px;position:sticky;top:0;z-index:100}
  .logo-wrap{display:flex;align-items:center;gap:14px}
  .logo-text{font-size:17px;font-weight:800;letter-spacing:-.5px}
  .hdiv{width:1px;height:20px;background:var(--border2)}
  .hsub{font-size:11px;color:var(--hint);letter-spacing:.04em}
  .hright{display:flex;align-items:center;gap:12px}
  .hdate{font-size:11px;color:var(--hint)}
  .hpill{font-size:10px;font-weight:700;background:var(--lime-dim);color:var(--lime);padding:4px 10px;border-radius:20px;border:.5px solid rgba(223,255,81,.25)}
  .container{max-width:1440px;margin:0 auto;padding:24px 28px 48px}
  .kpi-grid{display:grid;grid-template-columns:repeat(6,1fr);gap:10px;margin-bottom:22px}
  .kpi{background:var(--card);border:.5px solid var(--border);border-radius:10px;padding:16px 18px;position:relative;overflow:hidden}
  .kpi:hover{border-color:rgba(223,255,81,.18)}
  .kpi.hi{border-color:rgba(223,255,81,.25);background:rgba(223,255,81,.04)}
  .kpi-label{font-size:9px;font-weight:700;color:var(--hint);text-transform:uppercase;letter-spacing:.08em;margin-bottom:8px}
  .kpi-value{font-size:26px;font-weight:800;letter-spacing:-1px;line-height:1}
  .kpi.hi .kpi-value{color:var(--lime)}
  .kpi-sub{font-size:10px;color:var(--hint);margin-top:5px}
  .kpi-bar{position:absolute;bottom:0;left:0;right:0;height:2px;background:var(--gray-dark)}
  .kpi.hi .kpi-bar{background:var(--lime);opacity:.4}
  .qf-panel{background:var(--card);border:.5px solid rgba(223,255,81,.3);border-radius:12px;padding:18px 24px;margin-bottom:22px;display:flex;align-items:center;gap:20px;flex-wrap:wrap}
  .qf-title{font-size:9px;font-weight:700;color:var(--lime);text-transform:uppercase;letter-spacing:.1em;display:flex;align-items:center;gap:8px;flex-shrink:0}
  .qf-title::before{content:'';display:inline-block;width:6px;height:6px;border-radius:50%;background:var(--lime)}
  .qf-divider{width:1px;height:36px;background:rgba(223,255,81,.15);flex-shrink:0}
  .qf-group{display:flex;flex-direction:column;gap:5px;min-width:130px}
  .qf-group label{font-size:9px;font-weight:700;color:var(--lime);text-transform:uppercase;letter-spacing:.08em}
  .qf-group select{padding:9px 12px;border:.5px solid rgba(223,255,81,.35);border-radius:8px;font-size:12px;font-family:'Montserrat',sans-serif;font-weight:700;color:#fff;background:#0a0a0a;outline:none;cursor:pointer}
  .qf-group select:focus{border-color:var(--lime);box-shadow:0 0 0 3px rgba(223,255,81,.08)}
  .qf-group select option{background:#1a1a1a}
  .qf-reset{margin-left:auto;padding:9px 16px;border:.5px solid rgba(223,255,81,.25);border-radius:8px;font-size:11px;font-family:'Montserrat',sans-serif;font-weight:700;color:var(--lime);background:rgba(223,255,81,.05);cursor:pointer;white-space:nowrap}
  .qf-reset:hover{background:rgba(223,255,81,.12);border-color:var(--lime)}
  .charts-row{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px;margin-bottom:22px}
  .chart-card{background:var(--card);border:.5px solid var(--border);border-radius:10px;padding:18px 20px}
  .chart-title{font-size:9px;font-weight:700;color:var(--hint);text-transform:uppercase;letter-spacing:.08em;margin-bottom:14px;display:flex;align-items:center;gap:6px}
  .chart-title::before{content:'';display:inline-block;width:6px;height:6px;border-radius:50%;background:var(--lime)}
  .bar-row{display:flex;align-items:center;gap:8px;margin-bottom:8px}
  .bar-label{font-size:11px;color:var(--muted);width:110px;flex-shrink:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .bar-track{flex:1;height:4px;background:var(--gray-dark);border-radius:2px;overflow:hidden}
  .bar-fill{height:100%;border-radius:2px;background:var(--lime)}
  .bar-count{font-size:10px;color:var(--hint);width:26px;text-align:right;flex-shrink:0;font-weight:700}
  .slabel{font-size:9px;font-weight:700;color:var(--hint);text-transform:uppercase;letter-spacing:.1em;margin-bottom:10px;display:flex;align-items:center;gap:8px}
  .slabel::after{content:'';flex:1;height:.5px;background:var(--border)}
  .toolbar{background:var(--card);border:.5px solid var(--border);border-radius:10px;padding:12px 16px;margin-bottom:10px;display:flex;flex-wrap:wrap;gap:8px;align-items:center}
  .swrap{flex:1;min-width:200px;position:relative}
  .sicon{position:absolute;left:11px;top:50%;transform:translateY(-50%);color:var(--hint);pointer-events:none}
  input[type=text]{width:100%;padding:8px 10px 8px 33px;border:.5px solid var(--border2);border-radius:7px;font-size:12px;font-family:'Montserrat',sans-serif;color:var(--text);background:var(--dark);outline:none}
  input[type=text]:focus{border-color:var(--lime)}
  input[type=text]::placeholder{color:var(--hint)}
  select{padding:8px 10px;border:.5px solid var(--border2);border-radius:7px;font-size:11px;font-family:'Montserrat',sans-serif;font-weight:600;color:var(--muted);background:var(--dark);outline:none;cursor:pointer}
  select:focus{border-color:var(--lime)}
  option{background:#1a1a1a}
  .rbtn{padding:8px 14px;border:.5px solid var(--border2);border-radius:7px;font-size:11px;font-family:'Montserrat',sans-serif;font-weight:700;color:var(--hint);background:var(--dark);cursor:pointer;letter-spacing:.04em}
  .rbtn:hover{border-color:var(--lime);color:var(--lime)}
  .ctag{font-size:11px;color:var(--hint);margin-left:auto;white-space:nowrap;font-weight:600}
  .cnum{color:var(--lime)}
  .twrap{background:var(--card);border:.5px solid var(--border);border-radius:10px;overflow:hidden}
  .tscroll{overflow-x:auto;overflow-y:auto;max-height:calc(100vh - 340px)}
  table{width:100%;border-collapse:collapse;min-width:900px}
  thead{position:sticky;top:0;z-index:10}
  th{background:var(--card2);font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--hint);text-align:left;padding:10px 14px;border-bottom:.5px solid var(--border2);cursor:pointer;user-select:none;white-space:nowrap}
  th:hover{color:var(--muted)}
  th.sorted{color:var(--lime)}
  th.no-sort{cursor:default}
  th.no-sort:hover{color:var(--hint)}
  .arr{opacity:.5;font-size:9px}
  th.sorted .arr{opacity:1}
  td{padding:10px 14px;border-bottom:.5px solid var(--border);color:var(--muted);font-size:11px;font-weight:500;max-width:200px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  tr:last-child td{border-bottom:none}
  tr:hover td{background:rgba(255,255,255,.025);color:var(--text)}
  .tcrm{color:var(--lime);font-weight:700;font-size:12px}
  .tnum{text-align:right;font-variant-numeric:tabular-nums;font-weight:700;color:var(--text)}
  .badge{display:inline-flex;align-items:center;font-size:9px;font-weight:700;padding:2px 8px;border-radius:20px;letter-spacing:.04em;text-transform:uppercase;white-space:nowrap}
  .bg{background:rgba(34,197,94,.1);color:#4ade80;border:.5px solid rgba(34,197,94,.2)}
  .ba{background:rgba(234,179,8,.1);color:#facc15;border:.5px solid rgba(234,179,8,.2)}
  .br{background:rgba(239,68,68,.1);color:#f87171;border:.5px solid rgba(239,68,68,.2)}
  .bb{background:rgba(99,102,241,.1);color:#818cf8;border:.5px solid rgba(99,102,241,.2)}
  .bl{background:rgba(223,255,81,.08);color:#DFFF51;border:.5px solid rgba(223,255,81,.2)}
  .bx{background:rgba(255,255,255,.04);color:#6b7280;border:.5px solid rgba(255,255,255,.07)}
  .pgn{display:flex;align-items:center;gap:8px;padding:12px 16px;border-top:.5px solid var(--border)}
  .pbtn{padding:6px 12px;border:.5px solid var(--border2);border-radius:6px;font-size:11px;font-family:'Montserrat',sans-serif;font-weight:700;color:var(--muted);background:var(--dark);cursor:pointer}
  .pbtn:hover:not(:disabled){border-color:var(--lime);color:var(--lime)}
  .pbtn:disabled{opacity:.3;cursor:default}
  .pinfo{font-size:11px;color:var(--hint);font-weight:600}
  .psize{margin-left:auto;display:flex;align-items:center;gap:8px;font-size:11px;color:var(--hint);font-weight:600}
  /* Detail button */
  .det-btn{padding:4px 12px;background:rgba(223,255,81,.08);border:.5px solid rgba(223,255,81,.25);border-radius:6px;color:var(--lime);font-size:10px;font-weight:700;font-family:'Montserrat',sans-serif;cursor:pointer;white-space:nowrap;letter-spacing:.03em;transition:background .15s}
  .det-btn:hover{background:rgba(223,255,81,.18);border-color:var(--lime)}
  /* Modal */
  .modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:500;backdrop-filter:blur(3px);cursor:pointer}
  .modal-overlay.open{display:block}
  .modal{display:none;position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);width:min(700px,94vw);max-height:88vh;overflow-y:auto;background:#111;border:.5px solid rgba(223,255,81,.25);border-radius:14px;z-index:501;box-shadow:0 24px 80px rgba(0,0,0,.8)}
  .modal.open{display:block}
  .modal::-webkit-scrollbar{width:5px}
  .modal::-webkit-scrollbar-track{background:transparent}
  .modal::-webkit-scrollbar-thumb{background:rgba(255,255,255,.1);border-radius:3px}
  .modal-header{position:sticky;top:0;background:#111;border-bottom:.5px solid rgba(255,255,255,.07);padding:16px 22px;display:flex;align-items:flex-start;justify-content:space-between;gap:12px;z-index:1}
  .modal-crm{font-size:10px;font-weight:700;color:var(--lime);letter-spacing:.06em;margin-bottom:3px}
  .modal-title{font-size:15px;font-weight:700;color:#fff;line-height:1.3}
  .modal-close{flex-shrink:0;width:30px;height:30px;background:rgba(255,255,255,.06);border:.5px solid rgba(255,255,255,.12);border-radius:7px;color:#888;font-size:17px;cursor:pointer;display:flex;align-items:center;justify-content:center;margin-top:2px}
  .modal-close:hover{color:#fff;border-color:rgba(255,255,255,.3)}
  .modal-body{padding:20px 22px 24px}
  .modal-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
  .modal-field{background:rgba(255,255,255,.03);border:.5px solid rgba(255,255,255,.07);border-radius:8px;padding:10px 14px}
  .modal-field.full{grid-column:1/-1}
  .modal-field-label{font-size:9px;font-weight:700;color:var(--hint);text-transform:uppercase;letter-spacing:.08em;margin-bottom:4px}
  .modal-field-value{font-size:12px;color:#ddd;font-weight:500;line-height:1.5;word-break:break-word;white-space:pre-wrap}
  .modal-field-value a{color:var(--lime);text-decoration:none;font-size:11px}
  .modal-field-value a:hover{text-decoration:underline}
  .modal-field-value.lime{color:var(--lime);font-weight:700;font-size:14px}
  .modal-hint{font-size:10px;color:var(--hint);text-align:center;padding:10px 0 0;font-style:italic}
  @media(max-width:1100px){.kpi-grid{grid-template-columns:repeat(3,1fr)}.charts-row{grid-template-columns:1fr}.qf-panel{gap:12px}}
  .ms-wrap{position:relative;min-width:130px}
  .ms-btn{width:100%;padding:9px 12px;border:.5px solid rgba(223,255,81,.35);border-radius:8px;font-size:12px;font-family:'Montserrat',sans-serif;font-weight:700;color:#fff;background:#0a0a0a;cursor:pointer;text-align:left;display:flex;align-items:center;justify-content:space-between;gap:6px;white-space:nowrap;overflow:hidden}
  .ms-btn:focus{outline:none;border-color:var(--lime);box-shadow:0 0 0 3px rgba(223,255,81,.08)}
  .ms-btn .ms-arrow{font-size:9px;opacity:.6;flex-shrink:0;transition:transform .2s}
  .ms-wrap.open .ms-arrow{transform:rotate(180deg)}
  .ms-dropdown{display:none;position:absolute;top:calc(100% + 6px);left:0;min-width:160px;background:#111;border:.5px solid rgba(223,255,81,.3);border-radius:10px;z-index:200;padding:6px;box-shadow:0 12px 40px rgba(0,0,0,.7)}
  .ms-wrap.open .ms-dropdown{display:block}
  .ms-item{display:flex;align-items:center;gap:8px;padding:7px 10px;border-radius:6px;cursor:pointer;font-size:12px;font-weight:600;color:var(--muted);transition:background .12s}
  .ms-item:hover{background:rgba(255,255,255,.06);color:#fff}
  .ms-item input[type=checkbox]{accent-color:var(--lime);width:14px;height:14px;cursor:pointer;flex-shrink:0}
  .ms-item.checked{color:#fff}
  .ms-clear{width:100%;margin-top:4px;padding:5px;border:none;border-top:.5px solid rgba(255,255,255,.07);background:transparent;color:var(--hint);font-size:10px;font-family:'Montserrat',sans-serif;font-weight:700;cursor:pointer;text-align:center;padding-top:8px}
  .ms-clear:hover{color:var(--lime)}
  @media(max-width:700px){.kpi-grid{grid-template-columns:1fr 1fr}.hsub{display:none}.modal-grid{grid-template-columns:1fr}}
</style>
</head>

function pn(v){if(!v)return 0;return parseFloat(String(v).replace(/[$.,\s]/g,''))||0;}
function mf(v){const n=pn(v);if(n>=1e6)return'$'+(n/1e6).toFixed(1)+'M';if(n>=1e3)return'$'+(n/1e3).toFixed(0)+'K';return n?'$'+n.toLocaleString('es-AR'):'—';}
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function bdg(val){
  if(!val||val==='#N/A')return'<span style="color:var(--hint)">—</span>';
  const v=val.toLowerCase();
  if(v==='closed')return`<span class="badge bg">${val}</span>`;
  if(['cancelled','cancelado','no llego','no paso'].some(x=>v.includes(x)))return`<span class="badge br">${val}</span>`;
  if(['progress','avanza','revisada','priorizado'].some(x=>v.includes(x)))return`<span class="badge bb">${val}</span>`;
  if(['returned','bloqueado','on hold','backlog','validación'].some(x=>v.includes(x)))return`<span class="badge ba">${val}</span>`;
  if(['relevamiento','kick off','pre-kick','ejecucion','ept'].some(x=>v.includes(x)))return`<span class="badge bl">${val}</span>`;
  return`<span class="badge bx">${val}</span>`;
}
function pbdg(v){
  if(!v||v==='#N/A')return'<span style="color:var(--hint)">—</span>';
  const n=parseInt(v);
  if(n>=75)return`<span class="badge bg">${v}%</span>`;
  if(n>=40)return`<span class="badge ba">${v}%</span>`;
  return`<span class="badge bx">${v}%</span>`;
}

function fechaColor(mes,ano){
  if(!mes||!ano||ano==='1899'||mes==='#N/A'||ano==='#N/A')return'color:#666';
  const now=new Date();
  const curY=now.getFullYear(),curM=now.getMonth()+1;
  const ym=parseInt(ano)*12+parseInt(mes);
  const cur=curY*12+curM;
  const diff=ym-cur;
  if(diff<0) return'color:#f87171;font-weight:700'; // ROJO — pasado
  if(diff===0) return'color:#fb923c;font-weight:700'; // NARANJA — mes actual
  if(diff<=2) return'color:#facc15;font-weight:700'; // AMARILLO — +1 o +2 meses
  return'color:#4ade80;font-weight:700'; // VERDE — más de 2 meses
}

const NUM_COLS=new Set([F.CRM,F.Pb,F.Ms,F.An]);

function parseCol(v,col){
  const s=String(v||'').trim();if(!s||s==='#N/A')return NaN;
  if(NUM_COLS.has(col))return parseFloat(s)||NaN;
  if(MONEY_COLS.has(col))return parseFloat(s.replace(/\$/g,'').replace(/\./g,'').replace(',','.'))||NaN;
  return NaN;
}
function srt(){

    let r=(!isNaN(an)&&!isNaN(bn))?an-bn:String(av).localeCompare(String(bv),'es',{sensitivity:'base'});
    return sa?r:-r;
  });
}
